services:
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ptuser
      POSTGRES_PASSWORD: ptpass
      POSTGRES_DB: ptanalytics
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptuser"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started