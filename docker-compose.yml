services:
  db:
    image: postgis/postgis:15-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pt_user
      POSTGRES_PASSWORD: ptpass
      POSTGRES_DB: ptanalytics
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptuser -d ptanalytics"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8081:8080"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
    pgdata: